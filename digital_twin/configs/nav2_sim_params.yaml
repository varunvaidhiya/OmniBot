# Nav2 parameter overrides for Gazebo simulation.
#
# This file contains ONLY the keys that differ from the hardware baseline at
#   robot_ws/src/omnibot_navigation/config/nav2_params.yaml
# All other keys inherit from that file.  Pass this as the params_file arg:
#
#   ros2 launch omnibot_navigation autonomous_robot.launch.py \
#     params_file:=$(pwd)/digital_twin/configs/nav2_sim_params.yaml
#
# Key differences from hardware:
#   1. use_sim_time: True  (drives all nodes from /clock)
#   2. Inflation radius reduced (sim walls are perfectly flat, no sensor jitter)
#   3. Looser scan tolerances (Gazebo lidar is clean, no range noise spike)
#   4. Slightly higher controller frequency (sim CPU is usually faster)
#   5. AMCL sigma_hit tighter (perfect scan alignment expected in sim)

amcl:
  ros__parameters:
    use_sim_time: True
    sigma_hit: 0.05          # tighter than hardware 0.2 (sim scan is clean)
    z_hit: 0.95
    z_rand: 0.05
    update_min_a: 0.1
    update_min_d: 0.1
    transform_tolerance: 0.5
    robot_model_type: "nav2_amcl::OmnidirectionalMotionModel"

bt_navigator:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 30.0   # sim can sustain higher rate than hardware

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.35   # tighter than hardware 0.55 (clean sim walls)
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan pointcloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.0
          obstacle_min_range: 0.0
        pointcloud:
          topic: /camera/depth/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.6
          obstacle_max_range: 7.5
          obstacle_min_range: 0.6
          inf_is_valid: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.35
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan pointcloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.0
          obstacle_min_range: 0.0
        pointcloud:
          topic: /camera/depth/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.6
          obstacle_max_range: 7.5
          obstacle_min_range: 0.6
          inf_is_valid: false

map_server:
  ros__parameters:
    use_sim_time: True

map_saver:
  ros__parameters:
    use_sim_time: True

planner_server:
  ros__parameters:
    use_sim_time: True

recoveries_server:
  ros__parameters:
    use_sim_time: True

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: True
