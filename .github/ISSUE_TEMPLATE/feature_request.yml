name: Feature Request
description: Propose a new feature or improvement to an existing one.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project would this feature affect?
      options:
        - Robot hardware / drivers
        - Navigation (Nav2 / SLAM)
        - VLA inference (OpenVLA / SmolVLA)
        - Arm control
        - Data collection / dataset pipeline
        - Android app
        - Simulation (Gazebo)
        - CI / DevOps
        - Documentation
        - Multiple areas
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve, or what capability does it add? Be specific.
      placeholder: "Currently the emergency stop topic is published by the Android app but no ROS node subscribes to it, so pressing the stop button has no effect..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work. Code sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: implement
    attributes:
      label: Are you willing to implement this?
      options:
        - "Yes — I'll open a PR"
        - "Yes — but I need guidance"
        - "No — I'm requesting it for someone else to pick up"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
