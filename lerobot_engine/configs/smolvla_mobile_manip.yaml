# SmolVLA configuration for OmniBot mobile manipulation
# Base model: lerobot/smolvla_base (or lerobot/smolvla_base_so101 when available)

policy:
  name: smolvla
  pretrained_model_name_or_path: "lerobot/smolvla_base"

  # Observation space
  input_features:
    observation.images.wrist:
      type: visual
      shape: [3, 240, 320]
    observation.images.front:
      type: visual
      shape: [3, 240, 320]
    observation.state:
      type: low_dim
      dim: 9   # [j1..j6, base_vx, base_vy, base_vz]

  # Action space
  output_features:
    action:
      type: low_dim
      dim: 9   # [j1..j6, base_vx, base_vy, base_vz]

  # Action chunking
  chunk_size: 50
  n_action_steps: 1

  # Normalization stats (computed from dataset, update after recording)
  normalization_mode: min_max

  # State/action ranges
  state_min: [-3.14, -1.57, -1.57, -1.57, -3.14, -0.10, -0.3, -0.3, -1.0]
  state_max: [ 3.14,  1.57,  1.57,  1.57,  3.14,  0.80,  0.3,  0.3,  1.0]
  action_min: [-3.14, -1.57, -1.57, -1.57, -3.14, -0.10, -0.3, -0.3, -1.0]
  action_max: [ 3.14,  1.57,  1.57,  1.57,  3.14,  0.80,  0.3,  0.3,  1.0]

training:
  num_epochs: 100
  batch_size: 8
  lr: 1.0e-4
  lr_scheduler: cosine
  grad_clip_norm: 10.0
  save_every: 10

dataset:
  repo_id: "local/mobile_manipulation"
  fps: 30
  image_transforms:
    - type: resize
      height: 240
      width: 320
    - type: normalize
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
