[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "robot-episode-dataset"
version = "1.0.0"
description = "LeRobot-compatible episode dataset library for robot imitation learning"
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "numpy<2.0",
    "pyarrow>=14.0",
    "scipy>=1.10",
]

[project.optional-dependencies]
ros = [
    "rclpy",
]
torch = [
    "torch>=2.0",
]
viz = [
    "opencv-python>=4.8",
]
all = [
    "torch>=2.0",
    "opencv-python>=4.8",
]

[project.scripts]
red-ingest = "robot_episode_dataset.scripts.ingest:main"
red-validate = "robot_episode_dataset.scripts.validate:main"

[project.urls]
Homepage = "https://github.com/varunvaidhiya/Mecanum-Wheel-Robot"

[tool.setuptools.packages.find]
where = ["."]
include = ["robot_episode_dataset*"]
