[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "vla-serve"
version = "1.0.0"
description = "Model-agnostic Vision-Language-Action inference REST server"
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.0",
    "pillow>=10.0",
    "numpy<2.0",
]

[project.optional-dependencies]
openvla = [
    "torch>=2.0",
    "transformers>=4.40",
    "accelerate>=0.28",
    "bitsandbytes>=0.43",
]

[project.scripts]
vla-serve = "vla_serve.inference.server:main"

[project.urls]
Homepage = "https://github.com/varunvaidhiya/Mecanum-Wheel-Robot"
Repository = "https://github.com/varunvaidhiya/Mecanum-Wheel-Robot"

[tool.setuptools.packages.find]
where = ["."]
include = ["vla_serve*"]
