bev_stitcher:
  ros__parameters:
    # Camera names — one topic subscription is created per name
    camera_names: ['front', 'rear', 'left', 'right']

    # Topic pattern — {name} is replaced with each camera name
    input_topic_pattern: '/camera/{name}/image_raw'

    # Output topic for the stitched BEV image
    output_topic: '/camera/bev/image_raw'

    # TF frame id written into the published image header
    output_frame_id: 'bev_frame'

    # Source (input) image dimensions — cameras are resized to this before warping
    src_width: 640
    src_height: 480

    # Internal compositing canvas size (square)
    canvas_size: 800

    # Final published image dimensions (can differ from canvas_size)
    output_width: 800
    output_height: 800

    # Publish rate
    publish_hz: 30.0

    # Path to calibration file generated by bev_calibrate
    # If file not found, falls back to tiled layout (2×2 grid)
    calibration_file: ~/bev_calibration.npz
