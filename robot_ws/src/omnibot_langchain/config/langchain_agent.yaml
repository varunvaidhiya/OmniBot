langchain_agent_node:
  ros__parameters:
    # Anthropic API key — prefer setting ANTHROPIC_API_KEY env var instead
    # of placing the key here. Leave empty to use the environment variable.
    anthropic_api_key: ""

    # Base URL of the vla_serve FastAPI inference server (same machine as this node)
    vla_serve_url: "http://localhost:8000"

    # Path to named_locations.yaml. Leave empty to auto-resolve via
    # ament (reads from omnibot_hybrid share directory).
    locations_yaml: ""

    # Persistent object/location memory file (survives node restarts)
    entity_memory_path: "~/.omnibot/entity_memory.json"

    # LangChain ReAct agent limits
    agent_max_iterations: 10
    agent_timeout_sec: 120.0

    # Conversation history window: keep last N human/assistant turn pairs
    memory_window_k: 10

    # Scene description backend:
    #   true  = use Claude vision API (claude-sonnet-4-6) — recommended
    #   false = use vla_serve /predict endpoint
    use_claude_vision: true

    use_sim_time: false
