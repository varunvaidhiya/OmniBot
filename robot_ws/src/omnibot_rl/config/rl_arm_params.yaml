---
# RL Arm Node Parameters
# ──────────────────────
# Loaded by rl_inference.launch.py for rl_arm_node.
#
# policy_path: path to the exported ONNX arm policy file.
#   Export from Isaac Lab with:
#     python rl_engine/export/export_policy.py \
#       --checkpoint <path> --output ~/models/omnibot_arm_policy.onnx --type arm
#
# joint_names MUST use the arm_ prefix matching arm_params.yaml.
# See Known Issues in CLAUDE.md: default arm_driver_node names omit this prefix.

rl_arm_node:
  ros__parameters:
    # Policy
    policy_path: "~/models/omnibot_arm_policy.onnx"
    policy_hz:   20.0           # Hz — matches training env 20 Hz

    # Action limits (safe delta per step, mirrors servo control loop)
    max_delta: 0.05             # rad/step — ±2.9° per 50 ms step

    # Joint names (must match arm_params.yaml — prefixed form)
    joint_names:
      - arm_shoulder_pan
      - arm_shoulder_lift
      - arm_elbow_flex
      - arm_wrist_flex
      - arm_wrist_roll
      - arm_gripper

arm_cmd_mux:
  ros__parameters:
    default_mode: "smolvla"     # Start in SmolVLA pass-through mode

rl_object_pose_node:
  ros__parameters:
    # ArUco marker configuration
    aruco_dict_id:  4           # cv2.aruco.DICT_4X4_50
    marker_id:      0           # marker ID on target object
    marker_size_m:  0.05        # 50 mm side length

    # TF frames
    camera_frame: "wrist_camera_link"
    base_frame:   "base_link"

    # Fallback camera intrinsics (overridden by /camera/wrist/camera_info)
    fx: 250.0
    fy: 250.0
    cx: 160.0                   # half of 320px image width
    cy: 120.0                   # half of 240px image height

    # Depth refinement (depth image values are in mm for Orbbec Astra Pro)
    depth_scale_mm: 1.0

    # Publishing
    publish_hz:   20.0
    pose_hold_s:  0.5           # hold last known pose for 0.5 s after loss
