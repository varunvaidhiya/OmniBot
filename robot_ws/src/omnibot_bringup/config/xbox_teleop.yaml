teleop_twist_joy_node:
  ros__parameters:
    axis_linear:
      x: 0  # Left Stick Horizontal
      y: 1  # Left Stick Vertical
    scale_linear:
      x: 0.0625  # Max 0.0625 m/s (half of previous 0.125)
      y: 0.0625
    scale_linear_turbo:
      x: 0.125  # Max 0.125 m/s with turbo (half of previous 0.25)
      y: 0.125

    axis_angular:
      yaw: 3  # Right Stick Horizontal
    scale_angular:
      yaw: 0.125  # Max 0.125 rad/s (half of previous 0.25)
    scale_angular_turbo:
      yaw: 0.25  # Max 0.25 rad/s with turbo (half of previous 0.5)

    enable_button: 5  # RB (Right Bumper) as deadman switch
    enable_turbo_button: 7 # RT (Right Trigger) or adjust as needed
    require_enable_button: true
